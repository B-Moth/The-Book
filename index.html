<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Here are the secrets</title>
    <style>
        body {
            background: #1a1a1a;
            color: #d4af37;
            font-family: Georgia, serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            border: 3px solid #d4af37;
            padding: 40px;
            border-radius: 10px;
            background: #2a2a2a;
            max-width: 500px;
        }
        h1 {
            margin-top: 0;
            font-size: 28px;
        }
        input {
            padding: 10px;
            font-size: 18px;
            width: 250px;
            background: #3a3a3a;
            border: 2px solid #d4af37;
            color: #d4af37;
            margin: 20px 0;
        }
        button {
            padding: 10px 30px;
            font-size: 18px;
            background: #d4af37;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #b8941f;
        }
        #result {
            margin-top: 20px;
            font-size: 16px;
            line-height: 1.6;
            white-space: pre-line;
        }
        .success { color: #4ade80; }
        .fail { color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔮 Talk to me 🔮</h1>
        <p>What have you found ?</p>
        
        <input type="text" id="password" placeholder="..." />
        <br>
        <button onclick="checkPassword()">UNLOCK SECRETS</button>
        
        <div id="result"></div>
    </div>

    <script>
        // Multiple password-message pairs
        const secrets = [
            {
                hash: 'b17ef6d19c7a5b1ee83b907c595526dcb1eb06db8227d650d5dda0a9f4ce8cd9',
                encrypted: 'Zl5QQhZFEV9fFlxPEUZeVVpTRRYO',
            },
            {
                hash: '252f10c83610ebca1a059c0bae8255eba2f95be4d1d7bcfa89d7248a82d9f111',
                encrypted: 'BBoMDhcBCw4PBA==',
            },
            {
                hash: '0e182c4e164b10d32da3352394b4e86c8d0c4e91d5968bd9c2dcb8f7c0c0b8f7',
                encrypted: 'HQ4NDxwPHw4ZAw0dHwwZHhkODhkO',
            }
            // Add more password-message pairs here
        ];

        // Simple XOR encryption/decryption
        function xorCipher(text, key) {
            let result = '';
            for (let i = 0; i < text.length; i++) {
                result += String.fromCharCode(text.charCodeAt(i) ^ key.charCodeAt(i % key.length));
            }
            return result;
        }

        // Hash function
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Decrypt function
        function decryptMessage(encrypted, password) {
            try {
                const decoded = atob(encrypted);
                return xorCipher(decoded, password);
            } catch {
                return null;
            }
        }

        async function checkPassword() {
            const input = document.getElementById('password').value.toLowerCase().trim();
            const result = document.getElementById('result');
            
            const inputHash = await hashPassword(input);
            
            // Check against all stored passwords
            for (let secret of secrets) {
                if (inputHash === secret.hash) {
                    // Found matching password
                    const decrypted = decryptMessage(secret.encrypted, input);
                    
                    if (decrypted) {
                        result.className = 'success';
                        result.textContent = decrypted;
                        return;
                    } else {
                        result.className = 'fail';
                        result.textContent = '✗ DECRYPTION FAILED';
                        return;
                    }
                }
            }
            
            // No matching password found
            result.className = 'fail';
            result.textContent = '✗ ACCESS DENIED\n\nYou need to look deeper...';
        }

        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkPassword();
        });
    </script>
</body>
</html>
